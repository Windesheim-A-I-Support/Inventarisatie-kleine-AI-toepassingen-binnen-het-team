name: Render Quarto documents

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up TinyTeX for PDF
        uses: r-lib/actions/setup-tinytex@v2

      - name: Render website
        run: quarto render --to html

      - name: Render DOCX documents
        run: |
          mkdir -p _site/downloads
          quarto render 01-inventarisatie-kleine-ai-toepassingen.qmd --to docx --output-dir _site/downloads
          quarto render 02-direct-bruikbare-ai-tools.qmd --to docx --output-dir _site/downloads
          quarto render updates/week-01.qmd --to docx --output-dir _site/downloads

      - name: Render PDF documents
        run: |
          mkdir -p _site/downloads
          quarto render 01-inventarisatie-kleine-ai-toepassingen.qmd --to pdf --output-dir _site/downloads
          quarto render 02-direct-bruikbare-ai-tools.qmd --to pdf --output-dir _site/downloads
          quarto render updates/week-01.qmd --to pdf --output-dir _site/downloads

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: render
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4